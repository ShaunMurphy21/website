<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Search films and TV shows with poster cards and embedded playback." />
    <meta name="theme-color" content="#0c0e13" />
    <title>Movie Site</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="movie-hero">
      <nav class="movie-nav">
        <a href="../index.html" class="brand">SM</a>
        <a href="../index.html" class="nav-link">Home</a>
      </nav>

      <div class="hero-content">
        <p class="kicker">Movie and TV search</p>
        <h1>Find something worth watching.</h1>
        <p class="hero-copy">
          Browse latest additions, search by title and jump into a clean full-width player view.
        </p>

        <form class="search-panel" id="searchForm">
          <label class="visually-hidden" for="movieSearch">Movie or TV show name</label>
          <input
            type="search"
            class="form-control"
            placeholder="Search films and shows"
            aria-label="Movie or TV show name"
            id="movieSearch"
            autocomplete="off"
          />
          <label class="visually-hidden" for="yearFilter">Year</label>
          <input
            type="number"
            class="form-control"
            placeholder="Year"
            aria-label="Release year"
            id="yearFilter"
            min="1900"
            max="2099"
          />
          <label class="visually-hidden" for="choice">Content type</label>
          <select class="form-select" aria-label="Content type" id="choice">
            <option value="movie" selected>Movies</option>
            <option value="tv">TV Shows</option>
          </select>
          <button class="btn btn-info fw-semibold" type="submit" id="searchBtn">Search</button>
        </form>

        <div class="filter-panel" aria-label="Search filters">
          <label class="visually-hidden" for="genreFilter">Genre</label>
          <select class="form-select" id="genreFilter" aria-label="Genre filter">
            <option value="">All genres</option>
            <option>Action</option>
            <option>Adventure</option>
            <option>Animation</option>
            <option>Comedy</option>
            <option>Crime</option>
            <option>Documentary</option>
            <option>Drama</option>
            <option>Family</option>
            <option>Fantasy</option>
            <option>Horror</option>
            <option>Mystery</option>
            <option>Romance</option>
            <option>Sci-Fi</option>
            <option>Thriller</option>
          </select>

          <label class="visually-hidden" for="sortFilter">Sort</label>
          <select class="form-select" id="sortFilter" aria-label="Sort results">
            <option value="default">Default order</option>
            <option value="rating">Highest rated</option>
            <option value="year-desc">Newest year</option>
            <option value="year-asc">Oldest year</option>
            <option value="title">Title A-Z</option>
          </select>
        </div>

        <div class="playback-panel" aria-label="VSEmbed playback options">
          <label class="visually-hidden" for="subtitleUrl">Subtitle URL</label>
          <input
            type="url"
            class="form-control"
            placeholder="Subtitle .srt or .vtt URL"
            aria-label="Subtitle URL"
            id="subtitleUrl"
          />
          <label class="visually-hidden" for="subtitleLang">Subtitle language</label>
          <input
            type="text"
            class="form-control"
            placeholder="Sub lang"
            aria-label="Default subtitle language"
            id="subtitleLang"
            maxlength="8"
          />
          <label class="visually-hidden" for="seasonNumber">Season</label>
          <input
            type="number"
            class="form-control"
            placeholder="Season"
            aria-label="Episode season number"
            id="seasonNumber"
            min="1"
          />
          <label class="visually-hidden" for="episodeNumber">Episode</label>
          <input
            type="number"
            class="form-control"
            placeholder="Episode"
            aria-label="Episode number"
            id="episodeNumber"
            min="1"
          />
          <div class="playback-switches">
            <label class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="autoplayToggle" checked />
              <span class="form-check-label">Autoplay</span>
            </label>
            <label class="form-check form-switch">
              <input class="form-check-input" type="checkbox" role="switch" id="autonextToggle" />
              <span class="form-check-label">Auto-next</span>
            </label>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="toolbar">
        <div>
          <p class="kicker mb-1" id="eyebrow">Now showing</p>
          <h2 id="latestHeader">Latest Releases</h2>
        </div>
        <button class="btn btn-outline-light btn-sm" type="button" id="backToResults" hidden>
          Back to results
        </button>
      </section>

      <section class="browse-tabs" aria-label="Browse categories">
        <button class="btn btn-info btn-sm" type="button" data-browse="movie:latest">Latest Movies</button>
        <button class="btn btn-outline-light btn-sm" type="button" data-browse="tv:latest">Latest TV Shows</button>
        <button class="btn btn-outline-light btn-sm" type="button" data-browse="episode:latest">Latest Episodes</button>
      </section>

      <section id="statusMessage" class="status-message" aria-live="polite"></section>
      <section id="sourceControls" class="source-controls" hidden aria-label="Video source selector"></section>
      <section id="movieCards" class="movie-grid" aria-live="polite"></section>
      <div class="load-more-wrap">
        <button class="btn btn-outline-light" type="button" id="loadMoreBtn" hidden>Load more</button>
      </div>
      <section id="moviePlayer" class="player-shell"></section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./index.js"></script>
  </body>
</html>
